<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Springs League Series — Saison 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0f0f0f;
  --bg2:   #1a1a1a;
  --bg3:   #252525;
  --text:  #f0f0f0;
  --text2: #888;
  --text3: #444;
  --red:   #E8001A;
  --red-d: #B00015;
  --red-g: rgba(232,0,26,0.12);
  --border:#2a2a2a;
  --r:     8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--red);text-decoration:none}
a:hover{text-decoration:underline}
button,input,select,textarea{font-family:'Inter',sans-serif;cursor:pointer}
input,select,textarea{cursor:text}
img{display:block}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:2px solid var(--red);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-logo{height:32px;object-fit:contain}
.hdr-brand{font-size:.9rem;font-weight:800;letter-spacing:.04em}
.hdr-brand span{color:var(--red)}
.hdr-season{font-size:.68rem;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:10px;border:1px solid var(--border);white-space:nowrap}
.hdr-r{display:flex;align-items:center;gap:8px}
.btn-lang{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:3px 9px;border-radius:5px;font-size:.72rem;font-weight:700;transition:all .2s}
.btn-lang.active,.btn-lang:hover{border-color:var(--red);color:var(--text)}
.btn-auth{background:var(--red);color:#fff;border:none;padding:5px 13px;border-radius:6px;font-size:.78rem;font-weight:700;transition:background .2s}
.btn-auth:hover{background:var(--red-d)}
.btn-auth.on{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* ── NAV ── */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);padding:12px 16px;font-size:.82rem;font-weight:600;white-space:nowrap;transition:all .2s}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--red);border-bottom-color:var(--red)}
#nav-admin{display:none;color:#f59e0b}
#nav-admin.active{border-bottom-color:#f59e0b;color:#f59e0b}

/* ── LAYOUT ── */
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.tab{display:none}.tab.active{display:block}

/* ── POOL TOGGLE ── */
.ptoggle{display:flex;gap:8px;margin-bottom:18px}
.pbtn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:5px 18px;border-radius:20px;font-size:.8rem;font-weight:700;transition:all .2s}
.pbtn.active{background:var(--red);border-color:var(--red);color:#fff}

/* ── SECTION TITLE ── */
.stitle{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stitle::before{content:'';display:inline-block;width:3px;height:16px;background:var(--red);border-radius:2px;flex-shrink:0}

/* ── ACCUEIL ── */
.acc-top{display:grid;grid-template-columns:1fr 320px;gap:20px;margin-bottom:28px}
@media(max-width:860px){.acc-top{grid-template-columns:1fr}}
.stream-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.stream-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.stream-lbl{font-size:.72rem;font-weight:700;color:var(--text2);letter-spacing:.08em}
#twitch-embed{width:100%;aspect-ratio:16/9;background:#000}
#twitch-embed iframe{width:100%;height:100%;border:none}
.acc-side{display:flex;flex-direction:column;gap:14px}
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.info-card h3{font-size:.72rem;font-weight:700;color:var(--red);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.info-row:last-child{border-bottom:none}
.info-lbl{color:var(--text2)}
.info-val{font-weight:600}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:640px){.preview-grid{grid-template-columns:1fr}}
.preview-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.preview-hdr{background:var(--red);padding:7px 12px;font-size:.78rem;font-weight:700;letter-spacing:.04em}
.prev-row{display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);font-size:.8rem}
.prev-row:last-child{border-bottom:none}
.prev-row.top8{background:var(--red-g)}
.prev-rank{font-weight:700;font-size:.72rem;color:var(--text2)}
.prev-rank.g{color:#ffd700}
.prev-rank.s{color:#c0c0c0}
.prev-rank.b{color:#cd7f32}
.prev-pts{font-weight:700;color:var(--red);font-size:.78rem}

/* ── STANDINGS ── */
.stbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.stbl{width:100%;border-collapse:collapse;min-width:580px}
.stbl th{background:var(--bg3);padding:9px 11px;text-align:left;font-size:.68rem;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.stbl td{padding:9px 11px;border-bottom:1px solid var(--border);font-size:.83rem}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:rgba(255,255,255,.02)}
.stbl .rk{font-weight:700;color:var(--text2);width:32px}
.t-cell{display:flex;align-items:center;gap:9px}
.tlogo-sm{width:26px;height:26px;border-radius:4px;object-fit:contain;background:var(--bg3)}
.tname{font-weight:600}
.ttag{font-size:.72rem;color:var(--text2)}
.pts-cell{font-weight:700;color:var(--red)}
.lan-badge{background:var(--red-g);color:var(--red);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.04em}
.stbl tr.top8 td{background:var(--red-g)}

/* ── TEAMS ── */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.team-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.team-card:hover{border-color:var(--red);transform:translateY(-2px)}
.team-card img{width:64px;height:64px;object-fit:contain;border-radius:7px;margin:0 auto 10px;background:var(--bg3)}
.tc-name{font-weight:700;font-size:.82rem;margin-bottom:5px}
.tc-tag{font-size:.72rem;color:var(--text2);background:var(--bg3);display:inline-block;padding:2px 8px;border-radius:4px;font-weight:600}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto}
.modal.wide{max-width:760px}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-hdr h2{font-size:1rem;font-weight:700}
.btn-x{background:none;border:none;color:var(--text2);font-size:1.4rem;line-height:1;padding:2px 6px;transition:color .2s}
.btn-x:hover{color:var(--text)}
.modal-body{padding:20px}
.team-hero{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.team-hero img{width:72px;height:72px;object-fit:contain;border-radius:8px;background:var(--bg3)}
.th-name{font-size:1.1rem;font-weight:800}
.th-tag{color:var(--red);font-weight:700}
.th-meta{font-size:.78rem;color:var(--text2);margin-top:3px}
.roster-tbl{width:100%;border-collapse:collapse}
.roster-tbl th{font-size:.66rem;color:var(--text2);font-weight:700;padding:6px 8px;text-align:left;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.roster-tbl td{padding:8px;border-bottom:1px solid var(--border);font-size:.8rem}
.roster-tbl tr:last-child td{border-bottom:none}
.p-ava{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--bg3)}
.p-link{color:var(--red);font-size:.72rem;font-weight:600}

/* ── RESULTS ── */
.res-filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;align-items:center}
.week-tabs{display:flex;gap:6px;flex-wrap:wrap}
.wbtn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:16px;font-size:.78rem;font-weight:700;transition:all .2s}
.wbtn.active{background:var(--red);border-color:var(--red);color:#fff}
.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.match-card:hover{border-color:rgba(232,0,26,.35)}
.mc-meta{display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border);font-size:.7rem;color:var(--text2)}
.mc-body{display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;padding:12px 18px;gap:12px}
.mc-team{display:flex;align-items:center;gap:9px}
.mc-team.away{flex-direction:row-reverse;text-align:right}
.mc-logo{width:34px;height:34px;object-fit:contain;border-radius:5px;background:var(--bg3);flex-shrink:0}
.mc-name{font-weight:700;font-size:.88rem}
.mc-score{text-align:center}
.mc-score-val{font-size:1.7rem;font-weight:900;letter-spacing:.05em}
.mc-score-val .sep{color:var(--text3)}
.mc-pending{font-size:.76rem;color:var(--text2);font-style:italic}
.mc-foot{padding:7px 13px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.vod-btn{display:flex;align-items:center;gap:5px;color:var(--red);font-size:.74rem;font-weight:700}
.mc-badge{font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:3px}
.mc-badge.played{background:rgba(0,200,100,.1);color:#0c8}
.mc-badge.sched{background:rgba(255,255,255,.05);color:var(--text2)}
.mc-expand-btn{background:none;border:none;color:var(--text2);font-size:.74rem;font-weight:600;padding:0;transition:color .2s}
.mc-expand-btn:hover{color:var(--text)}
.mc-stats{display:none;padding:12px 18px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.mc-stats.open{display:block}
.stats-mini-section{margin-bottom:12px}
.stats-mini-lbl{font-size:.68rem;font-weight:700;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.mini-tbl{width:100%;border-collapse:collapse;font-size:.76rem}
.mini-tbl th{color:var(--text2);font-size:.65rem;font-weight:700;padding:3px 6px;text-align:right;border-bottom:1px solid var(--border)}
.mini-tbl th:first-child{text-align:left}
.mini-tbl td{padding:4px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04)}
.mini-tbl td:first-child{text-align:left;font-weight:600}
.mini-tbl tr:last-child td{border-bottom:none}
.mvp-chip{font-size:.6rem;background:#f59e0b;color:#000;padding:1px 4px;border-radius:3px;font-weight:700;margin-left:4px}

/* ── STATS ── */
.scat-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.scat-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:5px 15px;border-radius:16px;font-size:.8rem;font-weight:700;transition:all .2s}
.scat-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.stats-tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.stats-tbl{width:100%;border-collapse:collapse}
.stats-tbl th{background:var(--bg3);padding:9px 13px;text-align:left;font-size:.68rem;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase}
.stats-tbl td{padding:9px 13px;border-bottom:1px solid var(--border);font-size:.83rem}
.stats-tbl tr:last-child td{border-bottom:none}
.stats-tbl tr:hover td{background:rgba(255,255,255,.02)}
.sval{font-weight:700;color:var(--red);font-size:.95rem}
.pcell{display:flex;align-items:center;gap:10px}
.p-av{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--bg3);flex-shrink:0}
.medal{font-size:.95rem}

/* ── ADMIN ── */
.adm-subnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.adm-sub{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:5px 15px;border-radius:6px;font-size:.8rem;font-weight:700;transition:all .2s}
.adm-sub.active{background:#f59e0b;border-color:#f59e0b;color:#000}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:540px){.form-grid{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:.75rem;font-weight:600;color:var(--text2)}
.finput{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:6px;font-size:.83rem;transition:border-color .2s;width:100%}
.finput:focus{outline:none;border-color:var(--red)}
.finput option{background:var(--bg3)}
.fhint{font-size:.68rem;color:var(--text3)}
.f-actions{display:flex;gap:9px;margin-top:4px;grid-column:1/-1}
.btn-p{background:var(--red);border:none;color:#fff;padding:7px 18px;border-radius:6px;font-size:.82rem;font-weight:700;transition:background .2s}
.btn-p:hover{background:var(--red-d)}
.btn-s{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:6px;font-size:.82rem;font-weight:700;transition:all .2s}
.btn-s:hover{border-color:var(--text2);color:var(--text)}
.btn-d{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#ef4444;padding:5px 11px;border-radius:5px;font-size:.76rem;font-weight:700;transition:all .2s}
.btn-d:hover{background:rgba(239,68,68,.22)}
.btn-e{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:4px;font-size:.73rem;font-weight:700;transition:all .2s}
.btn-e:hover{border-color:var(--red);color:var(--red)}
.btn-res{background:var(--red-g);border:1px solid rgba(232,0,26,.3);color:var(--red);padding:4px 10px;border-radius:4px;font-size:.73rem;font-weight:700;transition:all .2s}
.btn-res:hover{background:var(--red);color:#fff}
.adm-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.adm-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.adm-item-l{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.adm-item-logo{width:26px;height:26px;border-radius:4px;object-fit:contain;background:var(--bg2)}
.adm-item-name{font-weight:600;font-size:.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-item-meta{font-size:.72rem;color:var(--text2)}
.adm-item-r{display:flex;gap:6px;flex-shrink:0}
.adm-sep{height:1px;background:var(--border);margin:16px 0}
.adm-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.adm-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:.8rem}

/* Match score entry modal */
.score-entry{display:grid;grid-template-columns:1fr 60px 1fr;gap:16px;align-items:center;background:var(--bg3);border-radius:var(--r);padding:16px;margin-bottom:14px}
.se-team{text-align:center}
.se-name{font-weight:700;font-size:.88rem;margin-bottom:8px}
.se-vs{font-size:1.2rem;font-weight:900;color:var(--text3);text-align:center}
.score-inp{width:64px;background:var(--bg2);border:2px solid var(--border);color:var(--text);padding:8px;border-radius:7px;font-size:1.6rem;font-weight:900;text-align:center}
.score-inp:focus{outline:none;border-color:var(--red)}
.team-stats-sect{margin-bottom:14px}
.tss-hdr{font-size:.76rem;font-weight:700;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.siform{width:100%;border-collapse:collapse}
.siform th{font-size:.66rem;color:var(--text2);font-weight:700;padding:5px 4px;text-align:center;border-bottom:1px solid var(--border);letter-spacing:.04em}
.siform th:first-child{text-align:left;min-width:110px}
.siform td{padding:3px 3px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center}
.siform td:first-child{text-align:left;font-size:.8rem;font-weight:600;padding-left:0}
.siform tr:last-child td{border-bottom:none}
.si-num{width:44px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px;border-radius:4px;font-size:.8rem;text-align:center}
.si-num:focus{outline:none;border-color:var(--red)}
.si-sc{width:60px}
.mvp-rb{width:15px;height:15px;accent-color:#f59e0b;cursor:pointer}

/* Calendar admin */
.cal-box{max-width:560px}
.cal-info{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px;font-size:.83rem;color:var(--text2);line-height:1.6}
.cal-info strong{color:var(--text)}
.name-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{background:var(--bg2);border:1px solid var(--border);padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:600}
.init-msg{margin-top:10px;padding:9px 13px;border-radius:6px;font-size:.82rem}
.init-msg.ok{background:rgba(0,200,100,.1);color:#0c8;border:1px solid rgba(0,200,100,.2)}
.init-msg.err{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}

/* Utilities */
.loading{display:flex;align-items:center;justify-content:center;padding:36px;color:var(--text2);font-size:.85rem;gap:10px}
.loading::before{content:'';width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:.88rem}
#toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:.82rem;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:300px;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:#0c8;color:#0c8}
#toast.err{border-color:#ef4444;color:#ef4444}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <img src="../assets/springs-logo.png" alt="Springs" class="hdr-logo">
    <span class="hdr-brand">SPRINGS <span>E-SPORT</span></span>
    <span class="hdr-season">Springs League Series — Saison 2</span>
  </div>
  <div class="hdr-r">
    <button class="btn-lang active" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="btn-lang" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="btn-auth" id="btn-auth" onclick="doAuth()">Connexion</button>
  </div>
</header>

<nav class="nav">
  <button class="nav-btn active" onclick="goTab('accueil')" id="nav-accueil">Accueil</button>
  <button class="nav-btn" onclick="goTab('classement')" id="nav-classement">Classement</button>
  <button class="nav-btn" onclick="goTab('equipes')" id="nav-equipes">Équipes</button>
  <button class="nav-btn" onclick="goTab('resultats')" id="nav-resultats">Résultats</button>
  <button class="nav-btn" onclick="goTab('statistiques')" id="nav-statistiques">Statistiques</button>
  <button class="nav-btn" onclick="goTab('admin')" id="nav-admin">⚙ Admin</button>
</nav>

<div class="main">

  <!-- ACCUEIL -->
  <section class="tab active" id="tab-accueil">

// ════════════════════════════════════════════════
// STANDINGS LOGIC
// ════════════════════════════════════════════════
function calcPts(own, opp) {
  if (own==null||opp==null) return 0;
  return (own>opp?3:0) + own*0.1;
}

function buildStandings(pool) {
  const teams = Object.values(teamsMap).filter(t=>t.pool===pool);
  const map = {};
  teams.forEach(t => { map[t.id]={...t,played:0,wins:0,losses:0,pts:0,gw:0,gl:0}; });
  Object.values(matchesMap).forEach(m => {
    if (m.pool!==pool||m.status!=='played') return;
    const h=map[m.homeTeamId], a=map[m.awayTeamId];
    if (!h||!a) return;
    h.played++; a.played++;
    h.gw+=m.homeScore; h.gl+=m.awayScore;
    a.gw+=m.awayScore; a.gl+=m.homeScore;
    const hp=calcPts(m.homeScore,m.awayScore), ap=calcPts(m.awayScore,m.homeScore);
    h.pts=Math.round((h.pts+hp)*100)/100;
    a.pts=Math.round((a.pts+ap)*100)/100;
    if(m.homeScore>m.awayScore){h.wins++;a.losses++;}else{a.wins++;h.losses++;}
  });
  return Object.values(map).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.gw!==a.gw) return b.gw-a.gw;
    return (b.gw-b.gl)-(a.gw-a.gl);
  });
}

async function loadAccueil() {

  }
  await fetchAll();
  [1,2].forEach(pool => {
    const rows = buildStandings(pool).slice(0,8);
    const el = document.getElementById('prev'+pool);
    if (!rows.length) { el.innerHTML='<div class="empty" style="padding:14px">—</div>'; return; }
    el.innerHTML = rows.map((t,i)=>{
      const rank=i+1;
      const cls=rank===1?'g':rank===2?'s':rank===3?'b':'';
      const logo=t.logoUrl?`<img src="${t.logoUrl}" style="width:20px;height:20px;object-fit:contain;border-radius:3px;background:var(--bg3)">`:'';
      return `<div class="prev-row${i<8?' top8':''}">
        <span class="prev-rank ${cls}">${rank}</span>
        <span style="display:flex;align-items:center;gap:6px">${logo}${esc(t.name)}</span>
        <span class="prev-pts">${t.pts.toFixed(1)}</span>
      </div>`;
    }).join('');
  });
}

function renderMatchCard(m) {
  const ht = teamsMap[m.homeTeamId]||{name:'?',logoUrl:''};
  const at = teamsMap[m.awayTeamId]||{name:'?',logoUrl:''};
  const played = m.status==='played';
  const score = played
    ? `<div class="mc-score-val"><span>${m.homeScore}</span><span class="sep"> - </span><span>${m.awayScore}</span></div>`
    : `<div class="mc-pending">vs</div>`;
  const badge = played
    ? `<span class="mc-badge played">${t('played')}</span>`
    : `<span class="mc-badge sched">${t('sched')}</span>`;
  const vod = played&&m.vodUrl ? `<a class="vod-btn" href="${m.vodUrl}" target="_blank" rel="noopener">▶ VOD</a>` : `<span></span>`;
  const statsBtn = played ? `<button class="mc-expand-btn" onclick="toggleStats('${m.id}')">Stats ▾</button>` : `<span></span>`;

  // Build stats section
  let statsHtml = '';
  if (played) {
    const mStats = statsArr.filter(s=>s.matchId===m.id);
    const hStats = mStats.filter(s=>s.teamId===m.homeTeamId);
    const aStats = mStats.filter(s=>s.teamId===m.awayTeamId);
    const renderStatsRows = (rows) => rows.map(s=>{
      const p = playersMap[s.playerId]||{};
      return `<tr ${s.mvp?'class="mvp-row"':''}>
        <td>${esc(p.pseudoRL||p.pseudoDiscord||'?')}${s.mvp?`<span class="mvp-chip">MVP</span>`:''}</td>
        <td>${s.goals}</td><td>${s.assists}</td><td>${s.saves}</td><td>${s.shots}</td><td>${s.score||0}</td>
      </tr>`;
    }).join('');
    const tblHead = `<tr><th style="text-align:left">Joueur</th><th>B</th><th>P</th><th>A</th><th>T</th><th>Sc</th></tr>`;
    statsHtml = `<div class="mc-stats" id="stats-${m.id}">
      ${hStats.length?`<div class="stats-mini-section"><div class="stats-mini-lbl">${esc(ht.name)}</div><table class="mini-tbl"><thead>${tblHead}</thead><tbody>${renderStatsRows(hStats)}</tbody></table></div>`:''}
      ${aStats.length?`<div class="stats-mini-section"><div class="stats-mini-lbl">${esc(at.name)}</div><table class="mini-tbl"><thead>${tblHead}</thead><tbody>${renderStatsRows(aStats)}</tbody></table></div>`:''}
      ${!hStats.length&&!aStats.length?`<div style="color:var(--text2);font-size:.8rem;padding:8px 0">Aucune statistique enregistrée.</div>`:''}
    </div>`;
  }

  return `<div class="match-card">
    <div class="mc-meta">
      <span>S${m.week} · Gr.${m.group} · Poule ${m.pool}</span>
      ${badge}
    </div>
    <div class="mc-body">
      <div class="mc-team">
        <img class="mc-logo" src="${ht.logoUrl||''}" alt="" onerror="this.src=''">
        <span class="mc-name">${esc(ht.name)}</span>
      </div>
      <div class="mc-score">${score}</div>
      <div class="mc-team away">
        <img class="mc-logo" src="${at.logoUrl||''}" alt="" onerror="this.src=''">
        <span class="mc-name">${esc(at.name)}</span>
      </div>
    </div>
    <div class="mc-foot">
      ${vod}
      ${statsBtn}
    </div>
    ${statsHtml}
  </div>`;
}

async function loadStats(cat) {
  const wrap = document.getElementById('stats-wrap');
  wrap.innerHTML = '<div class="loading"></div>';
  await fetchAll();
  if (!statsArr.length) { wrap.innerHTML=`<div class="empty">${t('no_stat')}</div>`; return; }

  // Aggregate per player
  const agg = {};
  statsArr.forEach(s => {
    if (!agg[s.playerId]) agg[s.playerId]={goals:0,assists:0,saves:0,shots:0,score:0,mvp:0,games:0};
    agg[s.playerId].goals  += s.goals||0;
    agg[s.playerId].assists+= s.assists||0;
    agg[s.playerId].saves  += s.saves||0;
    agg[s.playerId].shots  += s.shots||0;
    agg[s.playerId].score  += s.score||0;
    agg[s.playerId].mvp    += s.mvp?1:0;
    agg[s.playerId].games  += 1;
  });

  const isMvp = cat==='mvp';
  const isScore = cat==='score';
  const rows = Object.entries(agg)
    .map(([pid,v])=>({pid, val:isMvp?v.mvp:isScore?Math.round(v.score/v.games):v[cat], total:v[cat], games:v.games, ...v}))
    .filter(r=>r.val>0)
    .sort((a,b)=>b.val-a.val)
    .slice(0,30);

  if (!rows.length) { wrap.innerHTML=`<div class="empty">${t('no_stat')}</div>`; return; }

  const catLabel = STAT_CATS.find(c=>c.k===cat)?.[lang==='fr'?'fr':'en']||cat;
  const colLabel = isScore ? t('col_avg') : t('col_total');
  wrap.innerHTML = `<div class="stats-tbl-wrap"><table class="stats-tbl">
    <thead><tr>
      <th>${t('col_rank')}</th><th>${t('col_player')}</th><th>${t('col_team_s')}</th>
      <th>${colLabel} ${catLabel}</th><th>Matchs</th>
    </tr></thead>
    <tbody>${rows.map((r,i)=>{
      const p = playersMap[r.pid]||{};
      const team = teamsMap[p.teamId]||{};
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const av = p.photoUrl?`<img class="p-av" src="${p.photoUrl}" alt="" onerror="this.src=''">`:`<div class="p-av"></div>`;
      return `<tr>
        <td><span class="medal">${medal}</span>${!medal?i+1:''}</td>
        <td><div class="pcell">${av}<div><div style="font-weight:600">${esc(p.pseudoRL||p.pseudoDiscord||'?')}</div><div style="font-size:.72rem;color:var(--text2)">${FLAGS[p.country]||''}</div></div></div></td>
        <td style="color:var(--text2);font-size:.8rem">${esc(team.name||'—')}</td>
        <td><span class="sval">${r.val}</span></td>
        <td style="color:var(--text2)">${r.games}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

// ── Admin: Résultats ─────────────────────────────
async function admResults() {
  await fetchAll();
  const wrap = document.getElementById('adm-content');
  const poolOpts=`<option value="1">Poule 1</option><option value="2">Poule 2</option>`;
  const weekOpts=[`<option value="1">Semaine 1</option>`,`<option value="2">Semaine 2</option>`,`<option value="3">Semaine 3</option>`,`<option value="4">Semaine 4</option>`,`<option value="5">Semaine 5</option>`].join('');

  const renderMatchList = (pool=admMatchPool, week=admMatchWeek) => {
    const matches = Object.values(matchesMap)
      .filter(m=>m.pool===pool&&m.week===week)
      .sort((a,b)=>a.group?.localeCompare(b.group||'')||0);
    if (!matches.length) return `<div class="empty">Aucun match — initialisez d'abord le calendrier.</div>`;
    return matches.map(m=>{
      const ht=teamsMap[m.homeTeamId]||{name:'?'};
      const at=teamsMap[m.awayTeamId]||{name:'?'};
      const played=m.status==='played';
      return `<div class="adm-item">
        <div class="adm-item-l">
          <div><div class="adm-item-name">${esc(ht.name)} vs ${esc(at.name)}</div>
          <div class="adm-item-meta">Gr.${m.group} · ${played?`${m.homeScore}-${m.awayScore} ✓`:'À jouer'}</div></div>
        </div>
        <div class="adm-item-r">
          <button class="btn-res" onclick="openMatchEntry('${m.id}')">${played?'✏ Modifier':'+ Saisir'}</button>
          ${played?`<button class="btn-d" onclick="resetMatch('${m.id}')">↺</button>`:''}
        </div>
      </div>`;
    }).join('');
  };

  wrap.innerHTML = `
    <div class="adm-filter">
      <select class="adm-sel" id="ar-pool" onchange="admFilterMatch()">${poolOpts}</select>
      <select class="adm-sel" id="ar-week" onchange="admFilterMatch()">${weekOpts}</select>
    </div>
    <div class="adm-list" id="match-list">${renderMatchList()}</div>`;
  document.getElementById('ar-pool').value=String(admMatchPool);
  document.getElementById('ar-week').value=String(admMatchWeek);
}

window.admFilterMatch = function() {
  admMatchPool=parseInt(document.getElementById('ar-pool').value);
  admMatchWeek=parseInt(document.getElementById('ar-week').value);
  const matches=Object.values(matchesMap).filter(m=>m.pool===admMatchPool&&m.week===admMatchWeek)
    .sort((a,b)=>a.group?.localeCompare(b.group||'')||0);
  const list=document.getElementById('match-list');
  if(!matches.length){list.innerHTML=`<div class="empty">Aucun match — initialisez d'abord le calendrier.</div>`;return;}
  list.innerHTML=matches.map(m=>{
    const ht=teamsMap[m.homeTeamId]||{name:'?'};
    const at=teamsMap[m.awayTeamId]||{name:'?'};
    const played=m.status==='played';
    return `<div class="adm-item">
      <div class="adm-item-l">
        <div><div class="adm-item-name">${esc(ht.name)} vs ${esc(at.name)}</div>
        <div class="adm-item-meta">Gr.${m.group} · ${played?`${m.homeScore}-${m.awayScore} ✓`:'À jouer'}</div></div>
      </div>
      <div class="adm-item-r">
        <button class="btn-res" onclick="openMatchEntry('${m.id}')">${played?'✏ Modifier':'+ Saisir'}</button>
        ${played?`<button class="btn-d" onclick="resetMatch('${m.id}')">↺</button>`:''}
      </div>
    </div>`;
  }).join('');
};

window.resetMatch = async function(id) {
  if(!confirm('Remettre ce match à zéro ?')) return;
  try {
    await updateDoc(doc(db,'rl_matches',id),{status:'scheduled',homeScore:null,awayScore:null,vodUrl:''});
    // Delete stats
    const toDelete=statsArr.filter(s=>s.matchId===id);
    const batch=writeBatch(db);
    toDelete.forEach(s=>batch.delete(doc(db,'rl_match_stats',s.id)));
    await batch.commit();
    toast('Match réinitialisé','ok');
    await admResults();
  } catch(e){toast(t('err_save'),'err');}
};

  const at=teamsMap[m.awayTeamId]||{name:'?'};
  const hPlayers=Object.values(playersMap).filter(p=>p.teamId===m.homeTeamId);
  const aPlayers=Object.values(playersMap).filter(p=>p.teamId===m.awayTeamId);
  const existStats=statsArr.filter(s=>s.matchId===matchId);

  const playerRow=(p,side)=>{
    const ex=existStats.find(s=>s.playerId===p.id);
    return `<tr>
      <td>${esc(p.pseudoRL||p.pseudoDiscord||'?')}</td>
      <td><input class="si-num" type="number" min="0" max="99" value="${ex?.goals||0}" data-pid="${p.id}" data-tid="${p.teamId}" data-f="goals"></td>
      <td><input class="si-num" type="number" min="0" max="99" value="${ex?.assists||0}" data-pid="${p.id}" data-tid="${p.teamId}" data-f="assists"></td>
      <td><input class="si-num" type="number" min="0" max="99" value="${ex?.saves||0}" data-pid="${p.id}" data-tid="${p.teamId}" data-f="saves"></td>
      <td><input class="si-num" type="number" min="0" max="99" value="${ex?.shots||0}" data-pid="${p.id}" data-tid="${p.teamId}" data-f="shots"></td>
      <td><input class="si-num si-sc" type="number" min="0" value="${ex?.score||0}" data-pid="${p.id}" data-tid="${p.teamId}" data-f="score"></td>
      <td style="text-align:center"><input type="radio" class="mvp-rb" name="mvp" value="${p.id}" ${ex?.mvp?'checked':''}></td>
    </tr>`;
  };

  document.getElementById('mo-match-body').innerHTML = `
    <div class="score-entry">
      <div class="se-team">
        <div class="se-name">${esc(ht.name)}</div>
        <input class="score-inp" id="si-home" type="number" min="0" max="7" value="${m.homeScore??''}" placeholder="0">
      </div>
      <div class="se-vs">VS</div>
      <div class="se-team">
        <div class="se-name">${esc(at.name)}</div>
        <input class="score-inp" id="si-away" type="number" min="0" max="7" value="${m.awayScore??''}" placeholder="0">
      </div>
    </div>
    <div class="fg" style="margin-bottom:14px">
      <label>${t('f_vod')}</label>
      <input class="finput" id="si-vod" type="url" placeholder="https://youtube.com/..." value="${m.vodUrl||''}">
    </div>
    ${hPlayers.length?`<div class="team-stats-sect"><div class="tss-hdr">${esc(ht.name)}</div>
    <table class="siform"><thead><tr><th>Joueur</th><th>Buts</th><th>Passes</th><th>Arrêts</th><th>Tirs</th><th>Score</th><th>MVP</th></tr></thead>
    <tbody>${hPlayers.map(p=>playerRow(p,'home')).join('')}</tbody></table></div>`:''}
    ${aPlayers.length?`<div class="team-stats-sect"><div class="tss-hdr">${esc(at.name)}</div>
    <table class="siform"><thead><tr><th>Joueur</th><th>Buts</th><th>Passes</th><th>Arrêts</th><th>Tirs</th><th>Score</th><th>MVP</th></tr></thead>
    <tbody>${aPlayers.map(p=>playerRow(p,'away')).join('')}</tbody></table></div>`:''}
    <div class="f-actions">
      <button class="btn-p" onclick="saveMatchResult('${matchId}')">💾 ${t('save')}</button>
      <button class="btn-s" onclick="closeModal('mo-match')">${t('cancel')}</button>
    </div>`;
  openModal('mo-match');
};

window.saveMatchResult = async function(matchId) {
  const hs=parseInt(document.getElementById('si-home').value);
  const as_=parseInt(document.getElementById('si-away').value);
  const vod=document.getElementById('si-vod').value.trim();
  if (isNaN(hs)||isNaN(as_)) { toast('Scores requis','err'); return; }
  const mvpPid=document.querySelector('input[name="mvp"]:checked')?.value||null;
  try {
    // Update match
    await updateDoc(doc(db,'rl_matches',matchId),{status:'played',homeScore:hs,awayScore:as_,vodUrl:vod});
    // Delete old stats
    const old=statsArr.filter(s=>s.matchId===matchId);
    const batch=writeBatch(db);
    old.forEach(s=>batch.delete(doc(db,'rl_match_stats',s.id)));
    await batch.commit();
    // Add new stats
    const rows=document.querySelectorAll('.si-num[data-pid]');
    const playerData={};
    rows.forEach(inp=>{
      const pid=inp.dataset.pid, tid=inp.dataset.tid, field=inp.dataset.f;
      if(!playerData[pid]) playerData[pid]={playerId:pid,teamId:tid,matchId,goals:0,assists:0,saves:0,shots:0,score:0,mvp:false};
      playerData[pid][field]=parseInt(inp.value)||0;
    });
    if(mvpPid&&playerData[mvpPid]) playerData[mvpPid].mvp=true;
    const batch2=writeBatch(db);
    Object.values(playerData).forEach(d=>batch2.set(doc(collection(db,'rl_match_stats')),d));
    await batch2.commit();
    toast(t('saved'),'ok');
    closeModal('mo-match');
    await admResults();
  } catch(e){toast(t('err_save'),'err');console.error(e);}
};

window.initCalendar = async function() {
  const btn=document.querySelector('#adm-content .btn-p');
  btn.disabled=true; btn.textContent='...';
  try {
    await refreshTeams();
    const nameToId={};
    Object.values(teamsMap).forEach(t=>{nameToId[t.name.trim().toLowerCase()]=t.id;});
    const batch=writeBatch(db);
    let created=0,skipped=0,missing=[];
    for(const [pool,pd] of Object.entries(SCHEDULE)){
      pd.weeks.forEach((week,wi)=>{
        const wNum=wi+1;
        Object.entries(week).forEach(([grp,teams])=>{
          for(let i=0;i<teams.length;i++){
            for(let j=i+1;j<teams.length;j++){
              const hId=nameToId[teams[i].trim().toLowerCase()];
              const aId=nameToId[teams[j].trim().toLowerCase()];
              if(!hId||!aId){
                if(!hId) missing.push(teams[i]);
                if(!aId) missing.push(teams[j]);
                skipped++; continue;
              }
              batch.set(doc(collection(db,'rl_matches')),{
                pool:parseInt(pool),week:wNum,group:grp,
                homeTeamId:hId,awayTeamId:aId,
                status:'scheduled',homeScore:null,awayScore:null,vodUrl:''
              });
              created++;
            }
          }
        });
      });
    }
    await batch.commit();
    const uniq=[...new Set(missing)];
    const msg=document.getElementById('init-result');
    msg.className='init-msg ok';
    msg.textContent=`✓ ${created} matchs créés.${skipped?` ${skipped} ignorés (équipes manquantes : ${uniq.join(', ')})`:''} `;
  } catch(e){
    document.getElementById('init-result').className='init-msg err';
    document.getElementById('init-result').textContent='Erreur : '+e.message;
  }
  btn.disabled=false; btn.textContent='🚀 Initialiser';
};

// UTILITIES

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type='ok') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3000);
}
