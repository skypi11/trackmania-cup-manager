<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Springs Monthly Cup — Rocket League</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .back-btn {
            position: fixed;
            top: 20px; left: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }
        .logo .p  { color: #FFB800; }
        .logo .i1 { color: #7B2FBE; }
        .logo .s2 { color: #FFB800; }

        .coming-soon {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #0081FF, #FF6B35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
        }
        .subtitle {
            color: rgba(255,255,255,0.35);
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        .rl-image {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            opacity: 0.7;
            margin-bottom: 40px;
        }
        .info {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            max-width: 400px;
            line-height: 1.7;
        }
    </style>
</head>
<body>

<a href="../index.html" class="back-btn">← Accueil</a>

<img src="../assets/springs-logo.png" alt="Springs Esport" style="height:56px;width:auto;display:block;margin-bottom:32px;">

<img src="../assets/rl.webp" alt="Rocket League" class="rl-image">

<div class="coming-soon">Coming Soon</div>
<p class="subtitle">Rocket League — Springs Monthly Cup</p>
<p class="info">La section Rocket League est en cours de préparation.<br>Revenez bientôt !</p>

</body>
</html>
