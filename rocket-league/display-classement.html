<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement Suisse — SLS#2 LAN</title>
<link rel="icon" href="/assets/springs-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* Reset minimal pour écran géant */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#000;color:#f0f0f0;-webkit-font-smoothing:antialiased}

  /* Variables responsives — utilisent vh pour s'adapter à la hauteur dispo
     (16 rows doivent rentrer dans le viewport) et vw pour la largeur. */
  :root{
    --pad: clamp(16px, 1.6vw, 60px);
    --gap: clamp(10px, .9vw, 28px);
    --logo-sm: clamp(28px, 4vh, 80px);
    --rank-w: clamp(40px, 3vw, 100px);
    --t-h1: clamp(1.4rem, 2vw, 3.4rem);
    --t-row: clamp(1rem, 1.4vh + .4vw, 2.4rem);
    --t-meta: clamp(.78rem, .85vw, 1.4rem);
    --t-stat: clamp(.95rem, 1.6vh + .3vw, 2.2rem);
    --t-pts:  clamp(1.3rem, 2vh + .5vw, 3.4rem);
  }

  body{display:flex;flex-direction:column;background:radial-gradient(ellipse at top,#181818,#000 70%)}

  /* Header — compact pour libérer la place pour les 16 rows */
  .d-hdr{flex:0 0 auto;padding:calc(var(--pad)*.7) var(--pad) calc(var(--pad)*.5);display:flex;align-items:center;justify-content:space-between;gap:var(--gap);border-bottom:2px solid rgba(255,184,0,.25)}
  .d-hdr-l{display:flex;align-items:center;gap:var(--gap);min-width:0}
  .d-hdr-logo{height:clamp(44px,3.5vw,90px);width:auto}
  .d-hdr-title{font-size:var(--t-h1);font-weight:900;letter-spacing:-.02em;line-height:1}
  .d-hdr-title small{display:block;font-size:.42em;font-weight:700;color:rgba(255,184,0,.85);letter-spacing:.16em;margin-top:.5em;text-transform:uppercase}
  .d-hdr-r{display:flex;align-items:center;gap:var(--gap);font-size:var(--t-meta);font-weight:700;color:rgba(255,255,255,.65)}
  .d-live{display:inline-flex;align-items:center;gap:.4em;background:rgba(0,200,100,.14);border:1px solid rgba(0,200,100,.4);color:#0c8;padding:.3em .9em;border-radius:.4em;font-size:var(--t-meta);font-weight:800;text-transform:uppercase;letter-spacing:.1em}
  .d-live::before{content:'';display:inline-block;width:.55em;height:.55em;border-radius:50%;background:#0c8;animation:d-pulse 1.6s ease-in-out infinite}
  @keyframes d-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  /* Banner preview */
  .d-preview{flex:0 0 auto;padding:.4em 1.2em;background:linear-gradient(90deg,rgba(255,184,0,.15),rgba(255,107,53,.1));border-bottom:1px solid rgba(255,184,0,.4);font-size:var(--t-meta);font-weight:700;color:#FFB800;text-align:center}
  .d-preview[hidden]{display:none}

  /* Body */
  .d-body{flex:1 1 auto;padding:var(--pad);overflow:hidden;display:flex;flex-direction:column;gap:var(--gap);min-height:0}

  /* Tableau classement — flex pour que les 16 rows + header se répartissent
     dans la hauteur disponible quelle que soit la taille de l'écran. */
  .d-table{flex:1 1 auto;display:flex;flex-direction:column;gap:0;background:rgba(255,255,255,.02);border-radius:clamp(8px,.8vw,20px);overflow:hidden;min-height:0;position:relative}
  /* Watermark : grand logo SLS centré derrière les rows. Opacité plus
     forte que pour le Springs plein car le logo SLS est en outline
     (moins de matière visuelle, donc moins lisible à faible opacité). */
  .d-table::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:url('../assets/SpringsLeagueSeries.png') center/clamp(320px,42%,720px) no-repeat;opacity:.1;pointer-events:none;z-index:0}
  /* Mêmes grid-template-columns pour header et rows → alignement parfait.
     Numérique = text-align:right pour que les chiffres s'alignent par leur
     bord droit avec les headers (PTS / V / D / Δ). */
  .d-tbl-hdr,.d-row{display:grid;grid-template-columns:var(--rank-w) var(--logo-sm) 1fr clamp(70px,5.5vw,140px) clamp(56px,4vw,110px) clamp(56px,4vw,110px) clamp(70px,5vw,130px);align-items:center;gap:clamp(8px,.8vw,20px);padding:0 clamp(12px,1.2vw,30px);position:relative;z-index:1}
  .d-tbl-hdr{flex:0 0 auto;padding:clamp(8px,.8vw,20px) clamp(12px,1.2vw,30px);background:rgba(255,255,255,.05);font-size:var(--t-meta);font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5)}
  .d-tbl-hdr > div:nth-child(n+4){text-align:right}
  .d-row{flex:1 1 0;min-height:0;border-bottom:1px solid rgba(255,255,255,.04);transition:background .2s;overflow:hidden}
  .d-row:last-child{border-bottom:0}

  /* Top 8 — qualifiés bracket */
  .d-row.d-top8{background:linear-gradient(90deg,rgba(255,184,0,.08),rgba(255,184,0,.02))}
  .d-row.d-top8 .d-rank{color:#FFB800;font-weight:900}
  .d-row.d-top8 .d-rank::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:.25em;background:#FFB800;border-radius:1px}

  /* Séparateur "NON QUALIFIÉS BRACKET" : row dédiée plutôt qu'un ::before
     bricolé qui se faisait recouvrir par le contenu de la row précédente */
  .d-separator{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:clamp(10px,1vw,24px);padding:clamp(6px,.6vw,14px) clamp(12px,1.2vw,30px);background:rgba(0,0,0,.5);border-top:1px solid rgba(255,184,0,.35);border-bottom:1px solid rgba(255,184,0,.2);font-size:calc(var(--t-meta)*.95);font-weight:800;letter-spacing:.14em;color:rgba(255,184,0,.8);text-transform:uppercase;position:relative;z-index:2}
  .d-separator::before,.d-separator::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,184,0,.25),transparent);max-width:30%}

  .d-rank{position:relative;font-size:var(--t-row);font-weight:800;text-align:center;color:rgba(255,255,255,.55)}
  /* Logo : dimensionné par la hauteur de row (75% de la row, carré, capé à --logo-sm)
     pour qu'il ne déborde jamais quand les rows se compriment. */
  .d-logo{height:75%;width:auto;aspect-ratio:1;max-height:var(--logo-sm);max-width:var(--logo-sm);border-radius:clamp(4px,.5vw,12px);object-fit:contain;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);justify-self:center}
  .d-logo-ph{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.08)}
  .d-name{font-size:var(--t-row);font-weight:800;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Colonnes numériques : right-aligned pour que header et valeurs s'alignent
     par leur bord droit (les nombres ont des largeurs différentes). */
  .d-stat{font-size:var(--t-stat);font-weight:800;text-align:right;font-variant-numeric:tabular-nums}
  .d-pts{font-size:var(--t-pts);font-weight:900;text-align:right;color:#FFB800;font-variant-numeric:tabular-nums;line-height:1}
  .d-loss{color:rgba(239,68,68,.75)}
  .d-diff.d-pos{color:#0c8}
  .d-diff.d-neg{color:rgba(239,68,68,.75)}

  /* Footer — grid 3 colonnes pour vraie centring des sponsors */
  .d-foot{flex:0 0 auto;padding:calc(var(--pad)*.4) var(--pad);font-size:var(--t-meta);color:rgba(255,255,255,.35);font-weight:600;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:clamp(12px,1.5vw,40px);border-top:1px solid rgba(255,255,255,.05)}
  .d-foot-l{justify-self:start}
  .d-foot-r{justify-self:end}
  .d-sponsors{display:flex;align-items:center;justify-content:center;gap:clamp(20px,2.4vw,56px)}
  .d-sponsor{display:flex;align-items:center;justify-content:center}
  .d-sponsor img{height:clamp(34px,3.6vh,80px);width:auto;object-fit:contain;opacity:.95;filter:brightness(1.1)}

  /* Vue vide */
  .d-empty{flex:1;display:flex;align-items:center;justify-content:center;font-size:var(--t-h1);color:rgba(255,255,255,.4);font-weight:700;text-align:center;padding:var(--pad)}

  /* ── Mode Bracket — fullscreen 3 colonnes (WB / LB / GF) ── */
  .d-bracket{flex:1 1 auto;display:grid;grid-template-columns:1.4fr 1.4fr 1fr;gap:clamp(14px,1.4vw,32px);min-height:0;padding:0;overflow:hidden}
  .d-br-col{display:flex;flex-direction:column;gap:clamp(10px,1vw,22px);min-height:0;background:rgba(255,255,255,.02);border-radius:clamp(10px,1vw,20px);padding:clamp(12px,1.2vw,28px);border:1px solid rgba(255,255,255,.05)}
  .d-br-col.lb{background:linear-gradient(180deg,rgba(255,107,53,.04),rgba(255,107,53,.01))}
  .d-br-col.gf{background:linear-gradient(180deg,rgba(255,184,0,.10),rgba(255,184,0,.02));border-color:rgba(255,184,0,.35);justify-content:center}
  .d-br-col-hdr{flex:0 0 auto;font-size:calc(var(--t-meta)*1.1);font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);text-align:center;padding-bottom:clamp(8px,.8vw,16px);border-bottom:1px solid rgba(255,255,255,.08)}
  .d-br-col.lb .d-br-col-hdr{color:#FF8B5C}
  .d-br-col.gf .d-br-col-hdr{color:#FFB800;font-size:calc(var(--t-meta)*1.4)}
  .d-br-section{display:flex;flex-direction:column;gap:clamp(6px,.6vw,14px);flex:1 1 0;min-height:0}
  .d-br-section-lbl{font-size:calc(var(--t-meta)*.85);font-weight:800;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase;text-align:center}
  .d-br-matches{display:flex;flex-direction:column;gap:clamp(5px,.5vw,12px);flex:1 1 0;min-height:0}

  /* Carte match bracket */
  .d-br-m{flex:1 1 0;min-height:0;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:clamp(6px,.6vw,14px);padding:clamp(6px,.6vw,14px) clamp(10px,.9vw,22px);display:flex;flex-direction:column;justify-content:center;gap:clamp(4px,.3vw,10px);transition:all .25s;position:relative;overflow:hidden;max-height:clamp(90px,11vh,180px)}
  .d-br-m.played{border-color:rgba(0,200,100,.3)}
  .d-br-m.pending{border-color:rgba(255,184,0,.25)}
  .d-br-m.empty{border-color:rgba(255,255,255,.04);background:rgba(0,0,0,.2);opacity:.5}
  .d-br-m.stage{border-color:#FFB800;background:linear-gradient(135deg,rgba(255,184,0,.18),rgba(255,107,53,.06));box-shadow:0 0 24px rgba(255,184,0,.3)}
  .d-br-m.stage::before{content:'🎭 SCÈNE';position:absolute;top:.3em;right:.6em;font-size:calc(var(--t-meta)*.75);font-weight:900;color:#000;background:#FFB800;padding:.1em .6em;border-radius:.3em;letter-spacing:.06em}
  /* Grande Finale : carte XXL */
  .d-br-col.gf .d-br-m{max-height:none;flex:0 0 auto;padding:clamp(20px,2vw,48px) clamp(16px,1.5vw,36px);gap:clamp(12px,1.2vw,28px);background:linear-gradient(135deg,rgba(255,184,0,.14),rgba(255,107,53,.08));border:2px solid rgba(255,184,0,.5);box-shadow:0 0 40px rgba(255,184,0,.2)}

  .d-br-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:clamp(8px,.8vw,18px);min-width:0}
  .d-br-row.winner{}
  .d-br-row.loser{opacity:.5}
  .d-br-logo{width:clamp(24px,2.6vw,56px);height:clamp(24px,2.6vw,56px);border-radius:clamp(4px,.4vw,8px);object-fit:contain;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);flex-shrink:0}
  .d-br-name{font-size:calc(var(--t-meta)*1.4);font-weight:800;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .d-br-row.winner .d-br-name{color:#0c8}
  .d-br-row.loser .d-br-name{color:rgba(255,255,255,.4)}
  .d-br-score{font-size:calc(var(--t-meta)*2);font-weight:900;font-variant-numeric:tabular-nums;line-height:1;min-width:1.4em;text-align:center}
  .d-br-row.winner .d-br-score{color:#0c8}
  .d-br-row.loser .d-br-score{color:rgba(255,255,255,.35)}
  .d-br-score.empty{color:rgba(255,255,255,.2);font-size:calc(var(--t-meta)*1.4)}

  /* GF version XXL */
  .d-br-col.gf .d-br-logo{width:clamp(60px,5vw,120px);height:clamp(60px,5vw,120px)}
  .d-br-col.gf .d-br-name{font-size:calc(var(--t-meta)*2)}
  .d-br-col.gf .d-br-score{font-size:calc(var(--t-meta)*4.5)}

  .d-br-feeder{font-size:calc(var(--t-meta)*1.1);color:rgba(255,255,255,.35);font-weight:700;font-style:italic}

  /* Champion banner (mode finished) */
  .d-champion{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(20px,2vw,48px);padding:var(--pad);text-align:center}
  .d-champion-tag{font-size:calc(var(--t-meta)*1.2);font-weight:900;color:#FFB800;letter-spacing:.2em;text-transform:uppercase}
  .d-champion-logo{width:clamp(140px,16vw,360px);height:clamp(140px,16vw,360px);border-radius:clamp(16px,1.6vw,40px);border:3px solid rgba(255,184,0,.6);box-shadow:0 16px 80px rgba(255,184,0,.35);background:#000;object-fit:contain}
  .d-champion-name{font-size:calc(var(--t-meta)*5);font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,#FFB800,#FF6B35);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
  .d-champion-prize{font-size:calc(var(--t-meta)*1.8);font-weight:800;color:#FFB800}
</style>
</head>
<body>

<header class="d-hdr">
  <div class="d-hdr-l">
    <img src="../assets/springs-logo.png" alt="Springs" class="d-hdr-logo">
    <div class="d-hdr-title">
      Classement Suisse
      <small>SLS #2 — LAN · Magny-Cours</small>
    </div>
  </div>
  <div class="d-hdr-r">
    <span id="d-round-info"></span>
    <span class="d-live">LIVE</span>
  </div>
</header>

<div id="d-preview" class="d-preview" hidden></div>

<main class="d-body" id="d-body">
  <div class="d-empty">Chargement…</div>
</main>

<footer class="d-foot">
  <span class="d-foot-l">springs-esport.vercel.app/rocket-league/lan</span>
  <div class="d-sponsors">
    <div class="d-sponsor"><img src="../assets/PAGE_404.png" alt="Page 404 Informatique"></div>
    <div class="d-sponsor"><img src="../assets/Ibis-budget-2019.svg.png" alt="Ibis Budget"></div>
  </div>
  <span class="d-foot-r" id="d-now"></span>
</footer>

<script type="module">
  import { app } from '../shared/firebase-config.js';
  import { initializeAppCheck, ReCaptchaV3Provider } from 'firebase/app-check';
  initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6Lfc8Y0sAAAAAGozYyv9rRjgG6XUPffi-PsjYIGR'), isTokenAutoRefreshEnabled: true });

  import('./modules/display-common.js').then(({ setupListeners, getLanStatus, esc, teamLogo, PREVIEW_STATUS }) => {
    import('./modules/state.js').then(async ({ state }) => {
      const { buildStandings } = await import('./modules/standings.js');
      const { SWISS_ROUNDS, calcSeriesScore, calculateSwissStandings, getSwissMatches, getSwissRound }
        = await import('./modules/lan-swiss.js');
      const { SLOT_LABEL, getBracketMatches, getMatchBySlot }
        = await import('./modules/lan-bracket.js');

      // Banner preview
      if (PREVIEW_STATUS) {
        const banner = document.getElementById('d-preview');
        banner.hidden = false;
        banner.textContent = `👁 APERÇU — status forcé à "${PREVIEW_STATUS}" (données réelles)`;
      }

      function getQualifiedTeams(pool) {
        const manual = state.lanConfig?.manualQualified || [];
        const overrides = state.lanConfig?.poolOverrides || {};
        const stPool = buildStandings(pool);
        const otherPool = pool === 1 ? 2 : 1;
        const stOther = buildStandings(otherPool);

        const sortByStats = (a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          const diffA = a.gw - a.gl;
          const diffB = b.gw - b.gl;
          if (diffB !== diffA) return diffB - diffA;
          return b.gw - a.gw;
        };

        if (manual.length) {
          const set = new Set(manual);
          const all = [...stPool, ...stOther].filter(t => set.has(t.id));
          return all
            .filter(t => (overrides[t.id] != null ? Number(overrides[t.id]) : t.pool) === pool)
            .sort(sortByStats);
        }

        const q = state.lanConfig?.poolQuotas || { 1: 9, 2: 7 };
        const kept = stPool.filter(t => overrides[t.id] == null || Number(overrides[t.id]) === pool);
        const incoming = stOther.filter(t => Number(overrides[t.id]) === pool);
        return [...kept, ...incoming].sort(sortByStats).slice(0, q[pool] ?? q[String(pool)] ?? 8);
      }
      function isRoundComplete(swissMatches, round) {
        const ms = swissMatches.filter(m => getSwissRound(m.phase) === round);
        if (!ms.length) return false;
        return ms.every(m => m.status === 'played' || calcSeriesScore(m.games || [], m.format || 'bo5').played);
      }

      function setHeaderTitle(main, sub) {
        const title = document.querySelector('.d-hdr-title');
        if (!title) return;
        title.innerHTML = `${main}<small>${sub}</small>`;
      }

      function render() {
        if (!Object.keys(state.teamsMap || {}).length) return;
        const status = getLanStatus();
        const body = document.getElementById('d-body');
        const roundInfo = document.getElementById('d-round-info');

        // Mode bracket / finished : on bascule sur le rendu bracket
        if (status === 'bracket' || status === 'finished') {
          setHeaderTitle('Bracket Double Élim', 'SLS #2 — LAN · Magny-Cours');
          renderBracket(status === 'finished');
          return;
        }

        // Mode swiss / between / preparation : classement Suisse
        setHeaderTitle('Classement Suisse', 'SLS #2 — LAN · Magny-Cours');
        const swissMatches = getSwissMatches(Object.values(state.lanMatches));
        if (!swissMatches.length) {
          body.innerHTML = `<div class="d-empty">Phase Suisse pas encore démarrée</div>`;
          roundInfo.textContent = '';
          return;
        }

        // Round actuel = le plus haut round qui a au moins 1 match avec score, OU le dernier complet + 1
        let currentRound = 0, lastDone = 0;
        for (let r = 1; r <= SWISS_ROUNDS; r++) {
          if (swissMatches.some(m => getSwissRound(m.phase) === r)) currentRound = r;
          if (isRoundComplete(swissMatches, r)) lastDone = r;
        }
        roundInfo.textContent = `Round ${currentRound} / ${SWISS_ROUNDS}`;

        const qIds = [...getQualifiedTeams(1), ...getQualifiedTeams(2)].map(t => t.id);
        const standings = calculateSwissStandings(swissMatches, qIds);

        if (!standings.length) {
          body.innerHTML = `<div class="d-empty">Aucun classement à afficher</div>`;
          return;
        }

        const renderRow = (row, i) => {
          const team = state.teamsMap[row.teamId];
          if (!team) return '';
          const top8 = i < 8 ? 'd-top8' : '';
          const diff = row.gw - row.gl;
          const diffCls = diff > 0 ? 'd-pos' : (diff < 0 ? 'd-neg' : '');
          return `
            <div class="d-row ${top8}">
              <div class="d-rank">${i + 1}</div>
              ${teamLogo(team, 'd-logo')}
              <div class="d-name">${esc(team.name)}</div>
              <div class="d-pts">${row.pts.toFixed(1)}</div>
              <div class="d-stat">${row.wins}V</div>
              <div class="d-stat d-loss">${row.losses}D</div>
              <div class="d-stat d-diff ${diffCls}">${diff >= 0 ? '+' : ''}${diff}</div>
            </div>
          `;
        };

        // Séparateur entre top 8 et reste pour bien marquer la limite de qualif bracket
        const top8Rows = standings.slice(0, 8).map(renderRow).join('');
        const restRows = standings.slice(8).map((row, idx) => renderRow(row, idx + 8)).join('');
        const separator = standings.length > 8
          ? `<div class="d-separator">Non qualifiés bracket</div>`
          : '';

        body.innerHTML = `
          <div class="d-table">
            <div class="d-tbl-hdr">
              <div>#</div>
              <div></div>
              <div>Équipe</div>
              <div>Pts</div>
              <div>V</div>
              <div>D</div>
              <div>Δ</div>
            </div>
            ${top8Rows}
            ${separator}
            ${restRows}
          </div>
        `;
      }

      // ── Rendu BRACKET fullscreen (mode bracket / finished) ──
      function renderBracket(isFinished) {
        const body = document.getElementById('d-body');
        const roundInfo = document.getElementById('d-round-info');
        const bracketMatches = getBracketMatches(Object.values(state.lanMatches));

        if (!bracketMatches.length) {
          roundInfo.textContent = '';
          body.innerHTML = `<div class="d-empty">Bracket pas encore généré</div>`;
          return;
        }

        // Si terminé, on affiche le champion en grand
        const gf = getMatchBySlot(bracketMatches, 'gf');
        if (isFinished && gf) {
          const ss = calcSeriesScore(gf.games || [], gf.format || 'bo5');
          if (ss.played) {
            const champTeam = state.teamsMap[ss.winner === 'home' ? gf.homeTeamId : gf.awayTeamId];
            roundInfo.textContent = 'Tournoi terminé';
            if (champTeam) {
              const logo = champTeam.logoUrl
                ? `<img class="d-champion-logo" src="${esc(champTeam.logoUrl)}" alt="">`
                : `<div class="d-champion-logo"></div>`;
              body.innerHTML = `
                <div class="d-champion">
                  <div class="d-champion-tag">🏆 Champion SLS #2</div>
                  ${logo}
                  <div class="d-champion-name">${esc(champTeam.name)}</div>
                  <div class="d-champion-prize">800 € · Vainqueur de la LAN</div>
                </div>`;
              return;
            }
          }
        }

        roundInfo.textContent = isFinished ? 'Bracket terminé' : 'Bracket en cours';

        const renderMatch = (slot) => {
          const m = getMatchBySlot(bracketMatches, slot);
          if (!m) return `<div class="d-br-m empty"><div class="d-br-feeder">—</div></div>`;
          const home = m.homeTeamId ? state.teamsMap[m.homeTeamId] : null;
          const away = m.awayTeamId ? state.teamsMap[m.awayTeamId] : null;
          const ss = calcSeriesScore(m.games || [], m.format || 'bo5');
          const hasScore = ss.played || (m.games || []).length > 0;

          const homeName = home?.name || feederLabel(m.homeFeeder);
          const awayName = away?.name || feederLabel(m.awayFeeder);
          const homeLogo = home?.logoUrl
            ? `<img class="d-br-logo" src="${esc(home.logoUrl)}" alt="">`
            : `<div class="d-br-logo"></div>`;
          const awayLogo = away?.logoUrl
            ? `<img class="d-br-logo" src="${esc(away.logoUrl)}" alt="">`
            : `<div class="d-br-logo"></div>`;

          const homeWin = ss.played && ss.winner === 'home';
          const awayWin = ss.played && ss.winner === 'away';
          const cls = ['d-br-m'];
          if (!home || !away) cls.push('empty');
          else if (ss.played) cls.push('played');
          else cls.push('pending');
          if (m.onStage) cls.push('stage');

          const homeScoreCell = hasScore
            ? `<div class="d-br-score">${ss.home}</div>`
            : `<div class="d-br-score empty">–</div>`;
          const awayScoreCell = hasScore
            ? `<div class="d-br-score">${ss.away}</div>`
            : `<div class="d-br-score empty">–</div>`;

          return `
            <div class="${cls.join(' ')}">
              <div class="d-br-row ${homeWin?'winner':ss.played?'loser':''}">
                ${homeLogo}
                <div class="d-br-name">${esc(homeName)}</div>
                ${homeScoreCell}
              </div>
              <div class="d-br-row ${awayWin?'winner':ss.played?'loser':''}">
                ${awayLogo}
                <div class="d-br-name">${esc(awayName)}</div>
                ${awayScoreCell}
              </div>
            </div>`;
        };

        const renderSection = (label, slots) => `
          <div class="d-br-section">
            <div class="d-br-section-lbl">${label}</div>
            <div class="d-br-matches">${slots.map(renderMatch).join('')}</div>
          </div>`;

        body.innerHTML = `
          <div class="d-bracket">
            <div class="d-br-col wb">
              <div class="d-br-col-hdr">🏆 Winners Bracket</div>
              ${renderSection('Quarts (BO5)', ['wb_qf1','wb_qf2','wb_qf3','wb_qf4'])}
              ${renderSection('Demis (BO5)', ['wb_sf1','wb_sf2'])}
              ${renderSection('Finale WB (BO7)', ['wb_f'])}
            </div>
            <div class="d-br-col lb">
              <div class="d-br-col-hdr">⚔ Losers Bracket</div>
              ${renderSection('LB R1 (BO5)', ['lb_r1_1','lb_r1_2'])}
              ${renderSection('LB R2 (BO5)', ['lb_r2_1','lb_r2_2'])}
              ${renderSection('LB R3 (BO7)', ['lb_r3'])}
              ${renderSection('Finale LB (BO7)', ['lb_f'])}
            </div>
            <div class="d-br-col gf">
              <div class="d-br-col-hdr">⭐ Grande Finale</div>
              ${renderMatch('gf')}
            </div>
          </div>`;
      }

      function feederLabel(feeder) {
        if (!feeder) return '?';
        const [type, slot] = feeder.split(':');
        const lbl = SLOT_LABEL[slot] || slot;
        return type === 'winner' ? `Vainqueur ${lbl}` : `Perdant ${lbl}`;
      }

      // Horloge dans le footer (refresh chaque minute)
      function updateClock() {
        const d = new Date();
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        document.getElementById('d-now').textContent = `${h}:${m}`;
      }
      updateClock();
      setInterval(updateClock, 30000);

      setupListeners(render);
    });
  });
</script>

</body>
</html>
