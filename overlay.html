<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920">
    <title>Springs E-Sport — Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px; height: 1080px;
            background: transparent;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --accent: #00D936;
            --accent-glow: rgba(0,217,54,0.35);
            --panel-bg: rgba(8,8,8,0.88);
            --panel-border: rgba(255,255,255,0.07);
        }

        /* ── TOP-LEFT HEADER ── */
        .ov-header {
            position: absolute;
            top: 28px; left: 28px;
            display: flex; align-items: center; gap: 16px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            padding: 14px 22px;
            border-radius: 18px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideDown 0.6s cubic-bezier(.22,.68,0,1.2);
        }
        .ov-logo { height: 46px; filter: drop-shadow(0 0 16px var(--accent-glow)); }
        .ov-sep { width: 1px; height: 36px; background: rgba(255,255,255,0.08); }
        .ov-edition-name {
            font-size: 1.05rem; font-weight: 900; letter-spacing: -0.3px;
            text-transform: uppercase; max-width: 320px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .ov-status {
            display: flex; align-items: center; gap: 7px;
            margin-top: 4px; font-size: 0.67rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.8px;
            color: rgba(255,255,255,0.4);
        }
        .ov-live-dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239,68,68,0.9);
            animation: pulse 1.4s ease-in-out infinite;
        }
        .ov-live-dot.green { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); animation: none; }
        .ov-live-dot.orange { background: #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,0.8); animation: none; }

        /* ── RIGHT PANEL ── */
        .ov-panel {
            position: absolute;
            top: 28px; right: 28px; bottom: 28px;
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex; flex-direction: column;
            overflow: hidden;
            animation: slideLeft 0.6s cubic-bezier(.22,.68,0,1.2);
            transition: opacity 0.5s;
        }
        .ov-panel.hidden { opacity: 0; pointer-events: none; }

        .ov-panel-header {
            padding: 16px 18px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .ov-panel-title {
            font-size: 0.64rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2.5px;
            color: var(--accent);
        }
        .ov-panel-count {
            font-size: 0.78rem; font-weight: 800;
            color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.05);
            padding: 2px 9px; border-radius: 20px;
        }

        .ov-panel-list { flex: 1; overflow: hidden; padding: 6px 0; }

        .ov-player-item {
            display: flex; align-items: center; gap: 10px;
            padding: 7px 14px;
            animation: fadeSlideIn 0.35s ease;
        }
        .ov-player-rank {
            width: 22px; height: 22px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.68rem; font-weight: 800; flex-shrink: 0;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.35);
        }
        .ov-player-rank.gold   { background: rgba(251,191,36,0.18); color: #fbbf24; font-size: 0.9rem; }
        .ov-player-rank.silver { background: rgba(226,232,240,0.14); color: #e2e8f0; font-size: 0.9rem; }
        .ov-player-rank.bronze { background: rgba(205,127,50,0.18); color: #cd7f32; font-size: 0.9rem; }
        .ov-player-name {
            font-size: 0.88rem; font-weight: 700; flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .ov-player-team {
            font-size: 0.65rem; color: rgba(255,255,255,0.25);
            white-space: nowrap; max-width: 70px;
            overflow: hidden; text-overflow: ellipsis;
        }
        .ov-player-pts {
            font-size: 0.7rem; font-weight: 800;
            color: var(--accent);
            background: rgba(0,217,54,0.1);
            padding: 2px 7px; border-radius: 8px;
            flex-shrink: 0;
        }

        .ov-section-label {
            padding: 10px 14px 4px;
            font-size: 0.58rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px;
            color: rgba(255,255,255,0.18);
        }
        .ov-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 6px 14px; }

        /* ── COUNTDOWN (center-bottom) ── */
        .ov-countdown {
            position: absolute;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 20px 40px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(.22,.68,0,1.2);
            transition: opacity 0.5s;
        }
        .ov-countdown.hidden { opacity: 0; pointer-events: none; }
        .ov-countdown-label {
            font-size: 0.62rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 3px;
            color: rgba(255,255,255,0.3); margin-bottom: 8px;
        }
        .ov-countdown-value {
            font-size: 3rem; font-weight: 900; letter-spacing: -2px;
            color: var(--accent);
            text-shadow: 0 0 40px var(--accent-glow);
            line-height: 1;
        }

        /* ── PODIUM (center-bottom, replaces countdown in finale) ── */
        .ov-podium {
            position: absolute;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: flex-end; gap: 10px;
            transition: opacity 0.5s;
        }
        .ov-podium.hidden { opacity: 0; pointer-events: none; }

        .ov-podium-spot {
            display: flex; flex-direction: column; align-items: center;
        }
        .ov-podium-spot.pos-1 { animation: podiumRise 0.7s 0.0s cubic-bezier(.22,.68,0,1.2) both; }
        .ov-podium-spot.pos-2 { animation: podiumRise 0.7s 0.15s cubic-bezier(.22,.68,0,1.2) both; }
        .ov-podium-spot.pos-3 { animation: podiumRise 0.7s 0.3s cubic-bezier(.22,.68,0,1.2) both; }

        .ov-podium-info {
            text-align: center; margin-bottom: 10px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-radius: 14px; padding: 12px 18px;
            border: 1px solid var(--panel-border);
            min-width: 130px;
        }
        .ov-podium-medal { font-size: 1.9rem; line-height: 1; margin-bottom: 6px; }
        .ov-podium-name { font-size: 0.9rem; font-weight: 900; white-space: nowrap; }
        .ov-podium-team { font-size: 0.62rem; color: rgba(255,255,255,0.3); margin-top: 3px; }

        .ov-podium-block {
            width: 130px; border-radius: 10px 10px 0 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 900; letter-spacing: -1px;
        }
        .ov-podium-block-1 { height: 110px; background: linear-gradient(160deg, #fbbf24, #d97706); color: rgba(0,0,0,0.3); box-shadow: 0 -6px 30px rgba(251,191,36,0.35); }
        .ov-podium-block-2 { height: 78px; background: linear-gradient(160deg, #e2e8f0, #94a3b8); color: rgba(0,0,0,0.28); }
        .ov-podium-block-3 { height: 56px; background: linear-gradient(160deg, #cd7f32, #78350f); color: rgba(255,255,255,0.4); }

        /* ── WAITING (no active edition) ── */
        .ov-waiting {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: opacity 0.5s;
        }
        .ov-waiting.hidden { opacity: 0; pointer-events: none; }
        .ov-waiting-logo { height: 72px; margin-bottom: 18px; opacity: 0.18; filter: grayscale(1); }
        .ov-waiting-text {
            font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 4px;
            color: rgba(255,255,255,0.12);
        }

        /* ── BOTTOM ACCENT LINE ── */
        .ov-accent-line {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        /* ── ANIMATIONS ── */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(36px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(24px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.75); }
        }
        @keyframes podiumRise {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Accent line bottom -->
    <div class="ov-accent-line"></div>

    <!-- TOP-LEFT: Logo + Edition -->
    <div class="ov-header">
        <img src="Springs Esport.png" class="ov-logo" alt="Springs E-Sport">
        <div class="ov-sep"></div>
        <div>
            <div class="ov-edition-name" id="ovEditionName">Springs Monthly Cup</div>
            <div class="ov-status">
                <div class="ov-live-dot" id="ovDot"></div>
                <span id="ovStatusText">En attente...</span>
            </div>
        </div>
    </div>

    <!-- CENTER: Waiting state -->
    <div class="ov-waiting" id="ovWaiting">
        <img src="Springs Esport.png" class="ov-waiting-logo" alt="">
        <div class="ov-waiting-text">Aucun événement en cours</div>
    </div>

    <!-- RIGHT: Panel (inscrits / qualifiés / résultats) -->
    <div class="ov-panel hidden" id="ovPanel">
        <div class="ov-panel-header">
            <div class="ov-panel-title" id="ovPanelTitle">Inscrits</div>
            <div class="ov-panel-count" id="ovPanelCount">0</div>
        </div>
        <div class="ov-panel-list" id="ovPanelList"></div>
    </div>

    <!-- BOTTOM-CENTER: Countdown -->
    <div class="ov-countdown hidden" id="ovCountdown">
        <div class="ov-countdown-label">Début dans</div>
        <div class="ov-countdown-value" id="ovCountdownValue">--:--:--</div>
    </div>

    <!-- BOTTOM-CENTER: Podium finale -->
    <div class="ov-podium hidden" id="ovPodium"></div>

    <script type="module">
        import { initializeApp }        from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app-check.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBx4Goq8VR1I2MFf9L2wJm2TBaV-l_cCps",
            authDomain: "monthly-cup.firebaseapp.com",
            projectId: "monthly-cup",
            storageBucket: "monthly-cup.firebasestorage.app",
            messagingSenderId: "82527508810",
            appId: "1:82527508810:web:ca14ebfdeffb24d09889b3"
        };

        const app = initializeApp(firebaseConfig);
        try {
            initializeAppCheck(app, {
                provider: new ReCaptchaV3Provider('6Lfc8Y0sAAAAAGozYyv9rRjgG6XUPffi-PsjYIGR'),
                isTokenAutoRefreshEnabled: true
            });
        } catch(e) { console.warn('AppCheck init failed:', e); }
        const db = getFirestore(app);

        // Cup config
        const cupId = new URLSearchParams(window.location.search).get('cup') || 'monthly';
        const CUP = cupId === 'mania'
            ? { name: 'Springs Mania Cup', color: '#FFB800', glow: 'rgba(255,184,0,0.35)' }
            : { name: 'Springs Monthly Cup', color: '#00D936', glow: 'rgba(0,217,54,0.35)' };

        document.documentElement.style.setProperty('--accent', CUP.color);
        document.documentElement.style.setProperty('--accent-glow', CUP.glow);

        const POINTS = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];
        const getPoints = pos => pos > 0 ? (POINTS[pos - 1] ?? 1) : 0;
        const pName = p => p.pseudo || p.name || 'Inconnu';
        const cupFilter = item => (item.cupId || 'monthly') === cupId;

        let data = { editions: [], participants: [], results: [] };
        let loaded = { editions: false, participants: false, results: false };
        let countdownInterval = null;

        function allLoaded() { return Object.values(loaded).every(Boolean); }

        // ── DOM helpers ──
        const el = id => document.getElementById(id);
        const show = id => el(id).classList.remove('hidden');
        const hide = id => el(id).classList.add('hidden');

        // ── RENDER ──
        function render() {
            if (!allLoaded()) return;

            const activeEdition = data.editions.find(e => e.status === 'en_cours');
            const nextEdition = data.editions
                .filter(e => (e.status === 'inscriptions' || e.status === 'fermee') && new Date(e.date) >= new Date())
                .sort((a, b) => new Date(a.date) - new Date(b.date))[0];

            const edition = activeEdition || nextEdition;

            // Update header name
            el('ovEditionName').textContent = edition ? edition.name : CUP.name;

            if (!edition) {
                showWaiting(); return;
            }

            if (edition.status === 'en_cours')   { showLive(edition); return; }
            if (edition.status === 'inscriptions' || edition.status === 'fermee') { showPre(edition); return; }

            showWaiting();
        }

        // ── WAITING ──
        function showWaiting() {
            show('ovWaiting');
            hide('ovPanel');
            hide('ovCountdown');
            hide('ovPodium');
            el('ovDot').className = 'ov-live-dot orange';
            el('ovStatusText').textContent = 'Prochain événement bientôt';
            clearInterval(countdownInterval);
        }

        // ── PRE-EVENT (inscriptions / fermée) ──
        function showPre(edition) {
            hide('ovWaiting');
            hide('ovPodium');

            el('ovDot').className = edition.status === 'inscriptions' ? 'ov-live-dot green' : 'ov-live-dot orange';
            el('ovStatusText').textContent = edition.status === 'inscriptions' ? 'Inscriptions ouvertes' : 'Prochainement';

            // Countdown
            if (edition.date) {
                show('ovCountdown');
                startCountdown(edition.date, edition.time || '20:00');
            } else {
                hide('ovCountdown');
            }

            // Panel: inscrits
            const inscrits = data.results
                .filter(r => r.editionId === edition.id && r.phase === 'inscription');
            renderPanel('Inscrits', inscrits.length, inscrits.map((r, i) => {
                const p = data.participants.find(x => x.id === r.playerId);
                if (!p) return '';
                return playerRow(i + 1, '', pName(p), p.team || '', '');
            }).join(''));
        }

        // ── LIVE (en_cours) ──
        function showLive(edition) {
            hide('ovWaiting');
            hide('ovCountdown');
            clearInterval(countdownInterval);

            el('ovDot').className = 'ov-live-dot'; // red pulsing
            el('ovStatusText').textContent = 'EN DIRECT';

            const edRes = data.results.filter(r => r.editionId === edition.id);
            const inscrits = edRes.filter(r => r.phase === 'inscription');
            const quals = edRes.filter(r => r.phase === 'qualification');
            const finale = edRes.filter(r => r.phase === 'finale').sort((a, b) => a.position - b.position);

            if (finale.length > 0) {
                // Podium visible
                renderPodium(finale);
                renderPanel('Finale', finale.length, finale.map(r => {
                    const p = data.participants.find(x => x.id === r.playerId);
                    if (!p) return '';
                    const rankClass = r.position === 1 ? 'gold' : r.position === 2 ? 'silver' : r.position === 3 ? 'bronze' : '';
                    const medal = r.position <= 3 ? ['🥇','🥈','🥉'][r.position-1] : r.position;
                    return playerRow(medal, rankClass, pName(p), p.team || '', `+${getPoints(r.position)}pts`);
                }).join(''));
            } else if (quals.length > 0) {
                hide('ovPodium');
                renderPanel('Qualifiés', quals.length, quals.map((r, i) => {
                    const p = data.participants.find(x => x.id === r.playerId);
                    if (!p) return '';
                    return playerRow(i + 1, '', pName(p), p.team || '', '');
                }).join(''));
            } else {
                hide('ovPodium');
                renderPanel('Participants', inscrits.length, inscrits.map((r, i) => {
                    const p = data.participants.find(x => x.id === r.playerId);
                    if (!p) return '';
                    return playerRow(i + 1, '', pName(p), p.team || '', '');
                }).join('') || '<div style="padding:20px 14px;color:rgba(255,255,255,0.2);font-size:0.8rem;text-align:center">En attente de résultats...</div>');
            }
        }

        // ── HELPERS ──
        function playerRow(rank, rankClass, name, team, pts) {
            return `<div class="ov-player-item">
                <div class="ov-player-rank ${rankClass}">${rank}</div>
                <div class="ov-player-name">${name}</div>
                ${team ? `<div class="ov-player-team">${team}</div>` : ''}
                ${pts  ? `<div class="ov-player-pts">${pts}</div>` : ''}
            </div>`;
        }

        function renderPanel(title, count, listHtml) {
            el('ovPanelTitle').textContent = title;
            el('ovPanelCount').textContent = count;
            el('ovPanelList').innerHTML = listHtml || '<div style="padding:20px 14px;color:rgba(255,255,255,0.2);font-size:0.8rem;text-align:center">Aucun participant</div>';
            show('ovPanel');
        }

        function renderPodium(finale) {
            const podium = el('ovPodium');
            const blockH = { 1: 'ov-podium-block-1', 2: 'ov-podium-block-2', 3: 'ov-podium-block-3' };
            const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
            const order = [2, 1, 3];
            const spots = order.map(pos => finale.find(r => r.position === pos)).filter(Boolean);

            if (spots.length === 0) { hide('ovPodium'); return; }

            podium.innerHTML = spots.map(r => {
                const p = data.participants.find(x => x.id === r.playerId);
                if (!p) return '';
                const posClass = `pos-${r.position === 2 ? '2' : r.position === 1 ? '1' : '3'}`;
                return `<div class="ov-podium-spot ${posClass}">
                    <div class="ov-podium-info">
                        <div class="ov-podium-medal">${medals[r.position] || r.position}</div>
                        <div class="ov-podium-name">${pName(p)}</div>
                        ${p.team ? `<div class="ov-podium-team">${p.team}</div>` : ''}
                    </div>
                    <div class="ov-podium-block ${blockH[r.position] || 'ov-podium-block-3'}">${r.position}</div>
                </div>`;
            }).join('');
            show('ovPodium');
        }

        function startCountdown(dateStr, timeStr) {
            clearInterval(countdownInterval);
            const update = () => {
                const target = new Date(`${dateStr}T${timeStr}:00`);
                const diff = target - new Date();
                if (diff <= 0) {
                    el('ovCountdownValue').textContent = '00:00:00';
                    clearInterval(countdownInterval);
                    return;
                }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el('ovCountdownValue').textContent =
                    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            };
            update();
            countdownInterval = setInterval(update, 1000);
        }

        // ── REAL-TIME LISTENERS ──
        onSnapshot(collection(db, 'participants'), snap => {
            data.participants = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(cupFilter);
            loaded.participants = true; render();
        });
        onSnapshot(collection(db, 'editions'), snap => {
            data.editions = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(cupFilter);
            loaded.editions = true; render();
        });
        onSnapshot(collection(db, 'results'), snap => {
            data.results = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(cupFilter);
            loaded.results = true; render();
        });
    </script>
</body>
</html>
